version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: car-postgres

    environment:
      POSTGRES_DB: car_inventory
      POSTGRES_USER: car_user
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build: ./BackendAPI
    container_name: car-backend

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/car_inventory
      SPRING_DATASOURCE_USERNAME: car_user
      SPRING_DATASOURCE_PASSWORD: password
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

    depends_on:
      - postgres

  frontend:
    build: ./FrontendUI
    container_name: car-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

volumes:
  postgres-data:
